  <style>
    :root {
      --bg: #f3f7f5;
      --paper: #fffefb;
      --ink: #283b3d;
      --muted: #6f7f80;
      --line: #dce6e2;
      --green: #5f8d83;
      --green-dark: #426e65;
      --mint: #dcefe9;
      --blue: #e6eff8;
      --sand: #f4ead8;
      --lilac: #eeeaf6;
      --shadow: 0 18px 50px rgba(47, 75, 69, .09);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 7%, rgba(220, 239, 233, .9), transparent 28rem),
        radial-gradient(circle at 93% 12%, rgba(230, 239, 248, .75), transparent 28rem),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      line-height: 1.65;
    }
    button, input { font: inherit; }
    a { color: inherit; }
    .page { width: min(1120px, calc(100% - 30px)); margin: 0 auto; }
    .topbar { display: flex; align-items: center; gap: 18px; padding: 22px 0 16px; }
    .brand { display: inline-flex; align-items: center; gap: 11px; font-weight: 790; letter-spacing: -.02em; }
    .brand svg { width: 39px; height: 39px; }

    .hero {
      position: relative;
      overflow: hidden;
      padding: clamp(30px, 6vw, 64px);
      border: 1px solid rgba(220, 230, 226, .9);
      border-radius: 36px;
      background: rgba(255, 254, 251, .94);
      box-shadow: var(--shadow);
    }
    .hero::after { content: ""; position: absolute; right: -80px; bottom: -115px; width: 310px; height: 310px; border-radius: 50%; background: linear-gradient(145deg, var(--mint), var(--blue)); opacity: .9; }
    .hero-copy { position: relative; z-index: 1; max-width: 720px; }
    .eyebrow { display: inline-flex; padding: 6px 11px; border-radius: 999px; color: var(--green-dark); background: var(--mint); font-size: 12px; font-weight: 800; letter-spacing: .06em; }
    h1 { margin: 16px 0 10px; font-size: clamp(42px, 7vw, 70px); line-height: 1.04; letter-spacing: -.06em; }
    .lead { margin: 0; color: #647475; font-size: clamp(16px, 2vw, 19px); }
    .hero-meta { margin: 19px 0 0; color: #7b8989; font-size: 13px; }
    .hero-meta strong { color: var(--ink); }

    .group-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin: 24px 0; }
    .group-button {
      appearance: none;
      padding: 15px 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,254,251,.82);
      color: #5d7070;
      cursor: pointer;
      text-align: left;
      box-shadow: 0 7px 20px rgba(47,75,69,.05);
    }
    .group-button:hover, .group-button.active { border-color: #9fc5bb; background: #f7fcfa; transform: translateY(-1px); }
    .group-icon { display: block; width: 31px; height: 31px; margin-bottom: 8px; border-radius: 10px; background: var(--mint); color: var(--green-dark); text-align: center; line-height: 31px; font-weight: 850; }
    .group-button:nth-child(2) .group-icon { background: var(--blue); color: #537391; }
    .group-button:nth-child(3) .group-icon { background: #dff2f3; color: #4d7d80; }
    .group-button:nth-child(4) .group-icon { background: var(--sand); color: #846f4f; }
    .group-button:nth-child(5) .group-icon { background: var(--lilac); color: #71628e; }
    .group-name { display: block; font-size: 14px; font-weight: 790; }
    .group-count { display: block; color: #8a9696; font-size: 11px; }

    .tools { position: sticky; z-index: 12; top: 8px; margin-top: 18px; padding: 12px; border: 1px solid rgba(214,225,221,.92); border-radius: 22px; background: rgba(243,247,245,.88); backdrop-filter: blur(16px); box-shadow: 0 8px 24px rgba(47,75,69,.06); }
    .tool-row { display: flex; gap: 9px; align-items: center; }
    .search-wrap { position: relative; flex: 1; }
    #search { width: 100%; min-height: 49px; padding: 10px 43px; border: 1px solid var(--line); border-radius: 15px; outline: none; color: var(--ink); background: white; }
    #search:focus { border-color: #91beb2; box-shadow: 0 0 0 4px rgba(95,141,131,.12); }
    .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #869595; }
    #clearSearch { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); width: 32px; height: 32px; border: 0; border-radius: 10px; background: transparent; color: #7d8b8b; cursor: pointer; display: none; }
    .tool-button { min-height: 49px; padding: 8px 13px; border: 1px solid var(--line); border-radius: 15px; background: white; color: #607272; font-size: 13px; font-weight: 740; cursor: pointer; white-space: nowrap; }
    .tool-button:hover, .tool-button.active { color: var(--green-dark); border-color: #9fc5bb; background: #f7fcfa; }
    .chips { display: flex; gap: 7px; margin-top: 10px; overflow-x: auto; padding-bottom: 2px; }
    .chip { flex: none; padding: 6px 11px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.72); color: #718080; font-size: 12px; font-weight: 700; cursor: pointer; }
    .chip:hover, .chip.active { color: var(--green-dark); background: var(--mint); border-color: #add0c7; }
    .storage-note { margin: 8px 3px 0; color: #7a8988; font-size: 11px; line-height: 1.5; }

    .reset { border: 0; background: transparent; color: var(--green-dark); font-weight: 760; cursor: pointer; }

    .card { position: relative; display: flex; flex-direction: column; min-height: 225px; overflow: hidden; border: 1px solid var(--line); border-radius: 22px; background: rgba(255,254,251,.95); box-shadow: 0 7px 23px rgba(47,75,69,.05); scroll-margin-top: 150px; }

      background: #f7fcfa;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 760;
      cursor: pointer;

    .speak:hover, .speak.active { border-color: #91bdb2; background: var(--mint); color: #315b53; }

    .summary-label { display: block; margin-bottom: 2px; color: #8a9796; font-size: 10px; font-weight: 800; letter-spacing: .06em; }
    .desc { margin: 0; color: #5c6d6d; font-size: 13px; }
    details { margin-top: auto; border-top: 1px solid #e7eeeb; }
    summary { list-style: none; display: flex; justify-content: space-between; align-items: center; padding: 12px 19px; color: #6a7a79; font-size: 12px; font-weight: 750; cursor: pointer; }
    summary::-webkit-details-marker { display: none; }
    summary::after { content: "+"; display: grid; place-items: center; width: 24px; height: 24px; border-radius: 8px; color: var(--green-dark); background: var(--mint); font-size: 16px; }
    details[open] summary::after { content: "−"; }
    .links { display: flex; gap: 7px; flex-wrap: wrap; padding: 0 19px 17px; }
    .copy { display: inline-flex; align-items: center; min-height: 32px; padding: 5px 9px; border: 1px solid var(--line); border-radius: 10px; background: white; color: #667776; font-size: 11px; font-weight: 720; cursor: pointer; }
    .copy:hover { color: var(--green-dark); border-color: #a7c9c0; }
    .empty { grid-column: 1 / -1; padding: 50px 20px; border: 1px dashed #bfcfca; border-radius: 22px; text-align: center; color: var(--muted); background: rgba(255,255,255,.38); }
    .note { margin: 38px 0 0; padding: 18px 20px; border: 1px solid #e4ddcf; border-radius: 18px; background: #faf5ea; color: #756c5c; font-size: 12px; }
    footer { display: flex; justify-content: space-between; gap: 18px; margin: 42px 0 26px; padding-top: 20px; border-top: 1px solid var(--line); color: #83908f; font-size: 12px; }
    .toast { position: fixed; z-index: 50; left: 50%; bottom: 25px; transform: translate(-50%, 16px); padding: 9px 14px; border-radius: 12px; background: #2c4543; color: white; font-size: 12px; opacity: 0; pointer-events: none; transition: .2s ease; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    @media (max-width: 900px) {
      .group-strip { grid-template-columns: repeat(3, 1fr); }
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 620px) {
      .page { width: min(100% - 20px, 1120px); }
      .topbar { padding-top: 13px; }
      .hero { padding: 27px 20px; border-radius: 28px; }
      .hero::after { width: 180px; height: 180px; opacity: .62; }
      .group-strip { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .group-button { padding: 12px; }
      .tools { top: 5px; padding: 9px; }
      .tool-row { flex-wrap: wrap; }
      .search-wrap { flex-basis: 100%; }
      .tool-button { min-height: 40px; flex: 1; }
      .grid { grid-template-columns: 1fr; gap: 10px; }
      .card { min-height: 0; }
      footer { flex-direction: column; }
    }
    @media (prefers-reduced-motion: reduce) { * { scroll-behavior: auto !important; transition: none !important; } }
  </style>

esc":"自由泳抓水阶段尽早让前臂接近垂直，在不压低肘部的情况下增大有效抓水面积。","full":"","group":"游泳"},{"id":"swim-body-roll","term":"Body roll","zh":"身体滚转","category":"技术","desc":"自由泳和仰泳中肩、髋围绕身体纵轴协调转动，帮助移臂、呼吸与发力。","full":"","group":"游泳"},{"id":"swim-bilateral-breathing","term":"Bilateral breathing","zh":"双侧呼吸","category":"呼吸","desc":"自由泳中按固定节奏交替向左右两侧呼吸，有助于保持对称和适应不同水况。","full":"","group":"游泳"},{"id":"swim-kick","term":"Flutter kick","zh":"爬泳打腿","category":"技术","desc":"自由泳和仰泳中双腿交替上下打水的动作，主要用于稳定身体、维持节奏和辅助推进。","full":"","group":"游泳"},{"id":"swim-flip-turn","term":"Flip turn","zh":"翻滚转身","category":"转身","desc":"靠近池壁时前滚翻、屈腿蹬壁并流线滑出的转身技术，自由泳与仰泳训练中常见。","full":"","group":"游泳"},{"id":"swim-stroke-rate","term":"Stroke rate","zh":"划频","category":"指标","desc":"单位时间内完成的划臂周期数，通常与划距一起用来理解速度与效率的平衡。","full":"","group":"游泳"},{"id":"swim-distance-per-stroke","term":"Distance per stroke","zh":"划距","category":"指标","desc":"每个划臂周期向前移动的距离。划距较长可能表示滑行与抓水较好，但过度滑行也会拖慢速度。","full":"","group":"游泳"},{"id":"swim-swolf","term":"SWOLF","zh":"游泳效率分数","category":"指标","desc":"将游完一个池长所用的秒数与划水次数相加。它适合对比自己在相同池长和泳姿下的变化，不宜直接跨人比较。","full":"","group":"游泳"}];
    const GROUPS = ["旅行", "健身", "游泳", "商业常识", "数码工具"];
    const GROUP_ICONS = {"旅行":"↗", "健身":"▲", "游泳":"≈", "商业常识":"¥", "数码工具":"{}"};
    const state = { group: "全部", category: "全部", query: "", favoritesOnly: false };
    const favoriteKey = 'life-dictionary-favorites-v1';
    const favorites = loadFavorites(favoriteKey);
    const grid = document.getElementById('grid');
    const search = document.getElementById('search');
    const clearSearch = document.getElementById('clearSearch');
    const groupStrip = document.getElementById('groupStrip');
    const categoryChips = document.getElementById('categoryChips');
    const favoritesButton = document.getElementById('favoritesButton');
    const resultCount = document.getElementById('resultCount');
    const toast = document.getElementById('toast');
    let activeSpeechId = '';
    let speechRunId = 0;
    let speechUtterances = [];
    let availableVoices = [];
    const esc = value => String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const norm = value => String(value ?? '').toLowerCase().replace(/[\s._/-]+/g, '');

    function loadFavorites(key) {
      try {
        const saved = JSON.parse(localStorage.getItem(key) || '[]');
        return new Set(Array.isArray(saved) ? saved : []);
      } catch {
        return new Set();
      }
    }

    function saveFavorites() {
      try {
        localStorage.setItem(favoriteKey, JSON.stringify([...favorites]));
        return true;
      } catch {
        showToast('浏览器阻止了本地收藏');
        return false;
      }
    }

    function refreshVoices() {
      if ('speechSynthesis' in window) availableVoices = speechSynthesis.getVoices();
    }

    function voiceFor(lang) {
      const wanted = lang.toLowerCase();
      const family = wanted.split('-')[0];
      return availableVoices.find(voice => voice.lang.toLowerCase() === wanted)
        || availableVoices.find(voice => voice.lang.toLowerCase().startsWith(`${family}-`));
    }

    function updateSpeechButtons() {
      grid.querySelectorAll('[data-speak]').forEach(button => {
        const active = button.dataset.speak === activeSpeechId;
        button.classList.toggle('active', active);
        button.setAttribute('aria-pressed', String(active));
        button.querySelector('.speak-icon').textContent = active ? '■' : '🔊';
        button.querySelector('[data-speak-label]').textContent = active ? '停止朗读' : '朗读词条';
      });
    }

    function stopSpeech(message = '已停止朗读') {
      speechRunId += 1;
      if ('speechSynthesis' in window) speechSynthesis.cancel();
      activeSpeechId = '';
      speechUtterances = [];
      updateSpeechButtons();
      if (message) showToast(message);
    }

    function speakTerm(term) {
      if (!term || !('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
        showToast('当前浏览器不支持朗读，请用 Safari 或 Chrome 打开');
        return;
      }
      if (activeSpeechId === term.id) {
        stopSpeech();
        return;
      }

      speechRunId += 1;
      const runId = speechRunId;
      speechSynthesis.cancel();
      activeSpeechId = term.id;
      updateSpeechButtons();
      showToast(`正在朗读：${term.term}`);
      if (!availableVoices.length) refreshVoices();

      const englishText = term.full || (/[A-Za-z]/.test(term.term) ? term.term : '');
      const parts = [
        englishText ? { text: englishText, lang: 'en-US', rate: .86 } : null,
        { text: `${term.term}。${term.zh}。${term.desc}`, lang: 'zh-CN', rate: .92 }
      ].filter(Boolean);
      speechUtterances = parts.map(part => {
        const utterance = new SpeechSynthesisUtterance(part.text);
        utterance.lang = part.lang;
        utterance.rate = part.rate;
        const voice = voiceFor(part.lang);
        if (voice) utterance.voice = voice;
        utterance.onerror = event => {
          if (runId !== speechRunId || event.error === 'canceled' || event.error === 'interrupted') return;
          speechSynthesis.cancel();
          activeSpeechId = '';
          speechUtterances = [];
          updateSpeechButtons();
          showToast('朗读失败，请换 Safari 或 Chrome 重试');
        };
        return utterance;
      });
      speechUtterances[speechUtterances.length - 1].onend = () => {
        if (runId !== speechRunId) return;
        activeSpeechId = '';
        speechUtterances = [];
        updateSpeechButtons();
        showToast('朗读结束');
      };
      speechUtterances.forEach(utterance => speechSynthesis.speak(utterance));
    }

    function filtered() {
      const q = norm(state.query);
      return TERMS.filter(term => {
        if (state.group !== '全部' && term.group !== state.group) return false;
        if (state.category !== '全部' && term.category !== state.category) return false;
        if (state.favoritesOnly && !favorites.has(term.id)) return false;
        return !q || norm([term.term, term.full, term.zh, term.category, term.desc].join(' ')).includes(q);
      });
    }

    function renderGroups() {
      groupStrip.innerHTML = GROUPS.map(group => {
        const count = TERMS.filter(term => term.group === group).length;
        return `<button class="group-button ${state.group === group ? 'active' : ''}" type="button" data-group="${group}"><span class="group-icon">${GROUP_ICONS[group]}</span><span class="group-name">${group}</span><span class="group-count">${count} 个词条</span></button>`;
      }).join('');
      groupStrip.querySelectorAll('[data-group]').forEach(button => button.addEventListener('click', () => {
        state.group = state.group === button.dataset.group ? '全部' : button.dataset.group;
        state.category = '全部';
        renderGroups(); renderCategories(); renderTerms();
      }));
    }

    function renderCategories() {
      const available = TERMS.filter(term => state.group === '全部' || term.group === state.group);
      const categories = ['全部', ...new Set(available.map(term => term.category))];
      categoryChips.innerHTML = categories.map(category => `<button class="chip ${state.category === category ? 'active' : ''}" type="button" data-category="${esc(category)}">${esc(category)}</button>`).join('');
      categoryChips.querySelectorAll('[data-category]').forEach(button => button.addEventListener('click', () => {
        state.category = button.dataset.category; renderCategories(); renderTerms();
      }));
    }

    function card(term) {
      const speaking = activeSpeechId === term.id;
      return `<article class="card" id="${esc(term.id)}"><div class="card-main"><div class="card-top"><span class="category">${esc(term.category)}</span><button class="fav ${favorites.has(term.id) ? 'active' : ''}" type="button" data-favorite="${esc(term.id)}" aria-label="${favorites.has(term.id) ? '取消收藏' : '收藏'} ${esc(term.term)}">${favorites.has(term.id) ? '♥' : '♡'}</button></div><h2 class="term">${esc(term.term)}</h2>${term.full ? `<p class="full">${esc(term.full)}</p>` : ''}<p class="zh">${esc(term.zh)}</p><button class="speak ${speaking ? 'active' : ''}" type="button" data-speak="${esc(term.id)}" aria-label="朗读 ${esc(term.term)} 词条" aria-pressed="${speaking}"><span class="speak-icon" aria-hidden="true">${speaking ? '■' : '🔊'}</span><span data-speak-label>${speaking ? '停止朗读' : '朗读词条'}</span></button><span class="summary-label">简明介绍</span><p class="desc">${esc(term.desc)}</p></div><details><summary>分享词条</summary><div class="links"><button class="copy" type="button" data-copy="${esc(term.id)}">⎘ 复制链接</button></div></details></article>`;
    }

    function renderTerms() {
      const terms = filtered();
      resultCount.innerHTML = `当前显示 <strong>${terms.length}</strong> 个词条`;
      clearSearch.style.display = state.query ? 'block' : 'none';
      favoritesButton.classList.toggle('active', state.favoritesOnly);
      favoritesButton.querySelector('.heart').textContent = state.favoritesOnly ? '♥' : '♡';
      favoritesButton.querySelector('span:last-child').textContent = `本地收藏${favorites.size ? ` · ${favorites.size}` : ''}`;
      grid.innerHTML = terms.length ? terms.map(card).join('') : `<div class="empty">没找到这个词。可以换一个写法，或者先清空分类筛选。</div>`;
      grid.querySelectorAll('[data-favorite]').forEach(button => button.addEventListener('click', () => {
        const id = button.dataset.favorite;
        const wasFavorite = favorites.has(id);
        wasFavorite ? favorites.delete(id) : favorites.add(id);
        if (!saveFavorites()) wasFavorite ? favorites.add(id) : favorites.delete(id);
        else showToast(wasFavorite ? '已取消收藏' : '已收藏 · 只保存在当前浏览器');
        renderTerms();
      }));
      grid.querySelectorAll('[data-speak]').forEach(button => button.addEventListener('click', () => {
        speakTerm(TERMS.find(term => term.id === button.dataset.speak));
      }));
      grid.querySelectorAll('[data-copy]').forEach(button => button.addEventListener('click', async () => {
        const url = `${location.origin}${location.pathname}#${button.dataset.copy}`;
        try { await navigator.clipboard.writeText(url); showToast('链接已复制'); } catch { showToast('请从地址栏复制'); }
      }));
    }

    function resetAll() {
      Object.assign(state, { group: '全部', category: '全部', query: '', favoritesOnly: false });
      search.value = ''; renderGroups(); renderCategories(); renderTerms();
    }
    function showToast(message) { toast.textContent = message; toast.classList.add('show'); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove('show'), 1700); }

    search.addEventListener('input', () => { state.query = search.value; renderTerms(); });
    clearSearch.addEventListener('click', () => { search.value = ''; state.query = ''; search.focus(); renderTerms(); });
    favoritesButton.addEventListener('click', () => { state.favoritesOnly = !state.favoritesOnly; renderTerms(); });
    document.getElementById('resetButton').addEventListener('click', resetAll);
    document.getElementById('randomButton').addEventListener('click', () => {
      resetAll(); const term = TERMS[Math.floor(Math.random() * TERMS.length)];
      requestAnimationFrame(() => { const el = document.getElementById(term.id); el?.scrollIntoView({behavior:'smooth', block:'center'}); el?.querySelector('details')?.setAttribute('open',''); history.replaceState(null,'',`#${term.id}`); });
    });
    if ('speechSynthesis' in window) {
      refreshVoices();
      speechSynthesis.addEventListener?.('voiceschanged', refreshVoices);
    }
    renderGroups(); renderCategories(); renderTerms();
    if (location.hash) requestAnimationFrame(() => { const el = document.getElementById(decodeURIComponent(location.hash.slice(1))); el?.querySelector('details')?.setAttribute('open',''); el?.scrollIntoView({block:'center'}); });
  </script>
</body>
</html>
